<!DOCTYPE html>
<html lang="en">

<head>
    <title>{{company_id.name}}</title>
    <!-- Required meta tags -->
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous"/>
    <link rel="stylesheet" href="/sita_payment_integration/static/src/style.css"/>

    <!-- system -->
    <script src="https://qnbalahli.test.gateway.mastercard.com/static/checkout/checkout.min.js" data-error="errorCallback"
            data-cancel="cancelCallback"></script>

    <script type="text/javascript">

        function errorCallback(error) {
            console.log(JSON.stringify(error));
            console.log("error in order_id", "{{ order_id }}");
        }

        function cancelCallback() {
            console.log('Payment cancelled');
        }

        Checkout.configure({

            session: {
                id: '{{session_id}}'
            }

        });
        console.log("configure session {{session_id}}");

         function completeCallback() {
            console.log('Completed the payment');
            window.location.href = "/success_payment";
            var url = window.location.href
            console.log('url', url)

        }



    </script>


</head>

<body>
<div class="header">
    <div class="container">
        <div class="row">
            <div class="col-md-2">
                <!--                    <br/>-->
                </br>
                <img src="/sita_payment_integration/static/src/img/company.png" class="logo" alt=""/>
                <!--                    <img src="{{company_id.logo}}"-->
            </div>
            <div class="col-md-10">
                <h1>{{company_id.name}}</h1>
            </div>
        </div>
    </div>
</div>
<!-- Container -->
<div class="container">
    <div class="row">
        <table class="table table-borderless table-lg table-striped">
            <tbody>

            <tr>

                <td><strong>Client Name</strong></td>

                <td>{{client_name}}</td>

            </tr>

            <tr>

                <!--                        <td><strong>Reservation Number</strong> </td>-->

                <!--                        <td>{{reservation_id}}</td>-->

            </tr>

            <tr>

                <td><strong>Order ID </strong></td>

                <td>{{order_id}}</td>

            </tr>
            <tr>

                <td><strong>Currency</strong></td>

                <td>{{ currency }}</td>
            </tr>
            <tr>

                <td><strong>Amount</strong></td>

                <td>{{ amount }} </t>
                </td>
            </tr>


            </tbody>
        </table>

        <div id="embed-target" class="container"></div>
        <div class="mx-auto">
            <input type="button" value="PAY NOW" class="btn btn-info btn-lg"
                   onclick="Checkout.showEmbeddedPage('#embed-target'); this.style.visibility = 'hidden';"/>
        </div>
    </div>
</div>
<!-- Footer -->
<footer>
    <div class="container">
        <div class="row">
            <h3>Sponsored by</h3>
        </div>
        <div class="row">
            <div class="col-md-4 col-sm-0"></div>
            <div class="col-md-2 col-sm-6 firstLogo">
                <img src="/sita_payment_integration/static/src/img/nbe.jpg" class="rounded float-right" alt=""/>
            </div>
            <div class="col-md-2 col-sm-6">
                <img src="/sita_payment_integration/static/src/img/sita.jpg" class="rounded float-left" alt=""/>
            </div>
            <div class="col-md-4 col-sm-0"></div>
        </div>
    </div>
    <div class="copy">
        Copyright 2018 - 2022 <a href="https://sita-eg.com">Sita Egypt</a>
    </div>
</footer>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.src, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>

</html>
